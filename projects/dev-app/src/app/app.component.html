<div class="container">
  <h1>Development App for ngx-hex-editor</h1>
  <div class="textarea-section">
    <h3>Base16 Data (Hex String)</h3>
    <textarea
      [(ngModel)]="hexString"
      (ngModelChange)="onHexChange()"
      rows="5"
      placeholder="Enter hex data here..."
    ></textarea>
  </div>
  <div class="editor-section">
    <h3>Hex Editor</h3>
    <hex-editor
      [data]="binaryData"
      (dataChange)="onDataChange($event)"
      (dataDeltaChange)="onDataDeltaChange($event)"
      style="height: 400px; border: 1px solid #ccc"
    ></hex-editor>
  </div>

  <div class="events-section">
    <div class="events-header">
      <h3>Delta Events Log (latest 10)</h3>
      <button (click)="clearEvents()">Clear</button>
    </div>
    <div class="events-log">
      @for (event of deltaEvents; track $index) {
        <div class="event-item">{{ event }}</div>
      } @empty {
        <div class="no-events">
          No events yet. Edit the hex data to see changes.
        </div>
      }
    </div>
  </div>
</div>
